# Pitch zones and event display strings
# Used by format layer for position descriptions and event markers.
# Edit to change display text without touching code.

# --- Pitch dimensions (metres) ---
[pitch]
length = 105
width = 68

# --- Zone definitions ---
# Zones use normalised coordinates (0-100 scale, attacker's perspective)
# depth = distance from goal line (X axis, normalised)
# width = lateral position (Y axis, normalised, 50 = centre)

[zones.shot]
# Shot zones — attacker's perspective, depth + width
# Depth thresholds (metres from goal)
six_yard_depth = 5.5
penalty_depth = 16.5
edge_depth = 24.0
outside_depth = 35.0
# Width thresholds (normalised Y, centred on goal)
six_yard_width = [36.5, 63.5]    # 18.3m box
penalty_width = [20.4, 79.6]     # 40.3m box

[zones.shot.names]
six_yard = "6-yard box"
inside_box = "inside box"
edge = "edge of box"
outside = "outside box"
long_range = "long range"

[zones.pitch]
# Pitch zones — neutral position (no attacking direction assumed)
# Used for fouls, offsides, general position
near_box = [0, 20]          # or 80-100 from other end
between = [20, 35]          # or 65-80
midfield = [35, 65]

[zones.pitch.names]
near_box = "near penalty area"
between = "between midfield and box"
midfield = "midfield"

[zones.side]
# Width zones (normalised Y)
left = [0, 35]
central = [35, 65]
right = [65, 100]

[zones.side.names]
left = "left"
central = "central"
right = "right"

# --- Event display strings ---
[events.markers]
goal = ">>GOAL<<"
assist = "ASSIST"
yellow = "YELLOW"
red = "RED"
second_yellow_red = "2ND YELLOW/RED"
sub = "SUB"
penalty_awarded = "!! PENALTY"
period_start = "--- PERIOD"
period_end = "--- PERIOD END"
shot = "SHOT"
shot_on_target = "SHOT (on target)"
shot_off_target = "SHOT (off target)"
offside = "OFFSIDE"
corner = "CORNER"
foul = "FOUL"
save = "SAVE"
injury = "INJURY"
var = "** VAR"
pause = "BREAK"
delay = "BREAK"
resume = "RESUME"

[events.descriptions]
goal = "{player} scores!!"
assist = "Assisted by {player}."
foul = "{player} commits a foul."
offside = "{player} is ruled offside."
corner = "{player} takes a corner kick."
yellow = "{player} is booked by the referee."
red = "{player} is sent off."
second_yellow_red = "{player} receives a second yellow card."
save = "The goalkeeper pulls off a save."
period_start = "The referee signals the start."
period_end = "The referee brings the period to an end."
pause = "Scheduled mid-half break"
delay = "Scheduled mid-half break"
resume = "Match resumed after interruption"
sub = "ON: {on}, OFF: {off}"

[events.enrichment]
# Display format for enriched data
shot_position = "from {distance}m, {zone}, {side} ({raw_x},{raw_y})"
shot_placement = "placed {height}, {side} ({raw_x},{raw_y})"
foul_position = "{pitch_zone}, {side} ({raw_x},{raw_y})"
